_registry_metadata:
  version: 2.2.0
  specialization: 2026_Resiliency
nima_aesthetic:
  name: LemGendary NIMA Aesthetic Scorer
  class_name: NIMA_Model
  category: enhance
  filename: NIMAAesthetic
  checkpoint: NIMAAestheticWeights_FP32.pth
  input_size:
    - 3
    - 224
    - 224
  val_resolution: 384
  batch_size: auto
  learning_rate: 3.0e-05
  loss_fn: emd
  dataset_type: quality
  optimal_key: nima_aesthetic
  architecture_type: MobileNetV2 (Global Composition)
  description: Aesthetic quality scorer trained on custom standardized LemGendizedQualityDataset,
    optimized for artistic composition and color harmony.
  datasets:
    - LemGendizedNimaAesthetic
  sota_targets:
    plcc: 0.95
    srcc: 0.9
  stabilizers:
    softmax_temp: 1.0
    emd_epsilon: 0.0001
    logit_clamp: 15.0
    rank_weight: 0.2
    rank_margin: 0.05
  optimization:
    enabled: true
    initial_fraction: 0.1
    fraction_increment: 0.15
    res_ladder:
      - 112
      - 224
      - 384
    plateau_patience: 4
    cooling_factor: 0.85
    plateau_priority: resolution
    clamp_range:
      - 15.0
      - 45.0
    jolt_multiplier: 1.5
nima_technical:
  name: LemGendary NIMA Technical Scorer
  class_name: NIMA_Model
  category: enhance
