    initial_fraction: 0.1
    fraction_increment: 0.15
    res_ladder:
      - 256
      - 384
      - 512
      - 768
    plateau_patience: 4
    cooling_factor: 0.85
    plateau_priority: resolution
    clamp_range:
      - 15.0
      - 50.0
    jolt_multiplier: 1.5
