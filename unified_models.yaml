_registry_metadata:
  version: 2.2.0
  specialization: 2026_Resiliency
  datasets:
    LemGendizedQualityDataset:
      count: 440000
      url: "https://www.kaggle.com/datasets/lemtreursi/lemgendized-quality-dataset"
    LemGendizedNoiseDataset:
      count: 50000
      url: "https://www.kaggle.com/datasets/lemtreursi/lemgendized-noise-dataset"
    LemGendizedLowLightDataset:
      count: 25000
      url: "https://www.kaggle.com/datasets/lemtreursi/lemgendized-lowlight-dataset"
    LemGendizedFaceDataset:
      count: 15000
      url: "https://www.kaggle.com/datasets/lemtreursi/lemgendized-face-dataset"
    LemGendizedDegradationDataset:
      count: 100000
      url: "https://www.kaggle.com/datasets/lemtreursi/lemgendized-degradation-dataset"
    LemGendizedDetectionDataset:
      count: 20000
      url: "https://www.kaggle.com/datasets/lemtreursi/lemgendized-dettection-dataset"
    LemGendizedSuperResDataset:
      count: 30000
      url: "https://www.kaggle.com/datasets/lemtreursi/lemgendized-superres-dataset"

nima_aesthetic:
  name: LemGendary NIMA Aesthetic Scorer
  class_name: NIMA_Model
  category: enhance
  filename: NIMAAesthetic
  checkpoint: NIMAAestheticWeights_FP32.pth
  input_size:
  - 3
  - 224
  - 224
  batch_size: auto
  learning_rate: 3.0e-05
  loss_fn: emd
  dataset_type: quality
  optimal_key: nima_aesthetic
  architecture_type: MobileNetV2 (Global Composition)
  description: Aesthetic quality scorer trained on custom standardized LemGendizedQualityDataset, optimized for artistic composition and color harmony.
  datasets:
  - LemGendizedQualityDataset
  sota_targets:
    plcc: 0.95
    srcc: 0.90
  stabilizers:
    softmax_temp: 0.1
    emd_epsilon: 0.0001
    logit_clamp: 20.0
    rank_weight: 0.2
    rank_margin: 0.05
  optimization:
    enabled: true
    initial_fraction: 0.1
    fraction_increment: 0.15
    res_ladder: [112, 224, 384, 512]
    plateau_patience: 4
    cooling_factor: 0.85
    plateau_priority: resolution
    clamp_range: [15.0, 45.0]
    jolt_multiplier: 1.5
nima_technical:
  name: LemGendary NIMA Technical Scorer
  class_name: NIMA_Model
  category: enhance
  filename: NIMATechnical
  checkpoint: NIMATechnicalWeights_FP32.pth
  input_size:
  - 3
  - 384
  - 384
  batch_size: auto
  learning_rate: 1.8e-05
  kwargs:
    backbone: efficientnet_v2_s
  loss_fn: emd
  dataset_type: quality
  optimal_key: nima_technical
  architecture_type: EfficientNetV2-S (Spatial Integrity)
  description: Technical quality scorer trained on custom standardized LemGendizedQualityDataset, optimized for detecting micro-defects, noise, and artifacts.
  datasets:
  - LemGendizedQualityDataset
  sota_targets:
    plcc: 0.98
    srcc: 0.92
    rank_margin: 0.05
  optimization:
    enabled: true
    initial_fraction: 0.1
    fraction_increment: 0.15
    res_ladder: [256, 384, 512, 768]
    plateau_patience: 4
    cooling_factor: 0.85
    plateau_priority: resolution
    clamp_range: [15.0, 50.0]
    jolt_multiplier: 1.5
