# LemGendary Training Suite - Modular Training Config
# This config references the global unified definitions

unified_models: "unified_models_v2.yaml"

# Dynamic Execution Pathing
execution:
  mode: "training" # or "single_epoch_test"
  suffixes:
    training: "Large"
    single_epoch_test: "KaggleReady"
  use_local_root_datasets: true

# Global Training Defaults (can be overridden by model-specific config)
device: "cuda" # or "cpu"
num_workers: 0 # Forced to 0 for 4GB VRAM stability to prevent multiprocess deadlocks
pin_memory: true

# Base paths (relative to training/lemgendary-training-suite/)
# datasets_dir: "data/datasets"
datasets_dir: "../LemGendaryDatasets"
datasets_fallback_dir: "../LemGendaryDatasets"
checkpoint_dir: "checkpoints"
export_dir: "../LemGendaryModels"

# Kaggle Dataset URL Fallbacks (Used if not found locally)
kaggle_dataset_urls:
  LemGendizedNafNetDebluringLarge: "https://www.kaggle.com/datasets/lemtreursi/lemgendizednafnetdebluringlarge"
  LemGendizedNimaAuthenticityLarge: "https://www.kaggle.com/datasets/lemtreursi/lemgendizednimaauthenticitylarge"

# Default fallback values if not specified in unified_models.yaml
default_img_size: 256
default_batch_size: 8 # Lowered for 4GB VRAM stability at 384px
default_lr: 0.00025
default_epochs: 1000
early_stopping_patience: 250
intra_epoch_checkpoint_pct: "auto"

# Global Stabilizer Defaults (To prevent Infinite NaN loops across different architectures)
stabilizers:
  softmax_temp: 1.0
  emd_epsilon: 0.000001
  logit_clamp: 15.0

# External Repository Deployment Fallbacks
export_to_external_folder: false
external_folder_path: "../../../local_models"
