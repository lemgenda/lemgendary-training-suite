# LemGendary Training Suite - Modular Training Config
# This config references the global unified definitions

unified_models: "unified_models.yaml"
unified_data: "unified_data.yaml"

# Global Training Defaults (can be overridden by model-specific config)
device: "cuda" # or "cpu"
num_workers: 2 # Strict Windows IPC limit to prevent thread-thrashing overhead
pin_memory: true

# Base paths (relative to training/lemgendary-training-suite/)
datasets_dir: "data/datasets"
checkpoint_dir: "trained-models/checkpoints"
export_dir: "trained-models"

# Default fallback values if not specified in unified_models.yaml
default_img_size: 256
default_batch_size: 16
default_lr: 0.0001
default_epochs: 50

# External Repository Deployment Fallbacks
export_to_external_folder: false
external_folder_path: "../../../local_models"
